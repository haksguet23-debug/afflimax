version: '3'
services:
  n8n:
    image: n8nio/n8n:latest
    environment:
      - N8N_DATABASE_TYPE=postgres
      - N8N_DATABASE_HOST=${POSTGRES_HOST}
      - N8N_DATABASE_PORT=${POSTGRES_PORT}
      - N8N_DATABASE_USER=${POSTGRES_USER}
      - N8N_DATABASE_PASSWORD=${POSTGRES_PASSWORD}
      - N8N_DATABASE_NAME=${POSTGRES_DB}
      - N8N_AMAZON_TAG=confortbure07-21
      - N8N_PORT=5678
      - N8N_WEBHOOK_URL=https://affilmax.render.com
    depends_on:
      - postgres
    restart: always
    ports:
      - "5678:5678"

  postgres:
    image: postgres:latest
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  postgres-data:
